app:
  description: BIZDEV pillar — Brand strategy Eilinaire + Peadbuntid
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: agent-chat
  name: Nova
kind: app
version: 0.1.3
model_config:
  agent_mode:
    enabled: true
    max_iteration: 5
    strategy: function_call
    tools: []
  model:
    completion_params:
      temperature: 0.3
      max_tokens: 2000
    mode: chat
    name: claude-sonnet-4-6
    provider: anthropic
  pre_prompt: "You are Nova, the Business Developer Agent for COPREM OS.\nScope: BIZDEV\
    \ pillar — brand strategy for Eilinaire and Peadbuntid, partnerships, go-to-market\
    \ planning.\nDomain boundary: Never write code (→ Krit). Never manage trades (→\
    \ Eilinaire agent).\nHard rules:\n  - Brand Constitution First: validate every\
    \ output against brand DNA before delivery\n  - Data-Driven: every recommendation\
    \ needs data from Scout feeds or KB\n  - HITL required for: publishing content,\
    \ signing partnerships, budget commitments\nWhen idle: read research feeds → identify\
    \ 1 brand opportunity → write brief to services/bizdev/opportunities/\nEvery response\
    \ MUST end with:\n{ \"agent\": \"nova-v1.0\", \"pillar\": \"BIZDEV\" }"
  prompt_type: simple
  opening_statement: Hi, I am Nova. How can I help?
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  speech_to_text:
    enabled: false
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    enabled: false
  more_like_this:
    enabled: false
