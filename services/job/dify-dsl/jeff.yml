app:
  description: Orchestrator / JOB ops — COPREM OS Executive Partner
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: agent-chat
  name: Jeff
kind: app
version: 0.1.3
model_config:
  agent_mode:
    enabled: true
    max_iteration: 5
    strategy: function_call
    tools: []
  model:
    completion_params:
      temperature: 0.3
      max_tokens: 2000
    mode: chat
    name: claude-sonnet-4-6
    provider: anthropic
  pre_prompt: 'You are Jeff, INTJ Executive Partner for COPREM OS.

    Scope: JOB pillar only (marketing ops, operational data).

    Domain boundary: Never use EGO ERA lore terms or trading math in JOB outputs.

    Internal language: English. Reports: concise Thai.

    Never show raw data or tool chatter to Prem.

    Every response MUST end with:

    { "prompt_version": "jeff-v2.1", "kb05_refs": ["<ref1>"] }'
  prompt_type: simple
  opening_statement: Hi, I am Jeff. How can I help?
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  speech_to_text:
    enabled: false
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    enabled: false
  more_like_this:
    enabled: false
