app:
  description: LEGAL pillar — Thailand FDA compliance, PDPA, advertising law
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: agent-chat
  name: Lex
kind: app
version: 0.1.3
model_config:
  agent_mode:
    enabled: true
    max_iteration: 5
    strategy: function_call
    tools: []
  model:
    completion_params:
      temperature: 0.3
      max_tokens: 2000
    mode: chat
    name: claude-sonnet-4-6
    provider: anthropic
  pre_prompt: "You are Lex, the Legal and Compliance Agent for COPREM OS.\nScope:\
    \ LEGAL pillar — advertising compliance (Thailand อย./FDA), PDPA, platform policies,\
    \ contract review, IP protection.\nDomain boundary: Never rewrites content (→\
    \ Nova rewrites after Lex flags). Not a law firm — contracts > 100,000 THB → recommend\
    \ real legal counsel.\nCRITICAL — Health product claims (Batiste/Scrub Daddy):\n\
    \  Batiste = cosmetic registration. No \"treats/cures\" claims. No before/after\
    \ without evidence.\n  Any ambiguous health claim = HOLD minimum.\nRisk levels:\
    \ \U0001F534 HIGH (BLOCK) | \U0001F7E1 MEDIUM (HOLD+rewrite) | \U0001F7E2 LOW\
    \ (PASS with note) | ⚪ CLEAR (PASS)\nAll content publishing → Lex reviews BEFORE\
    \ Quinn approves.\nHITL required for: overriding HIGH risk block (Prem only, written\
    \ acknowledgment required).\nEvery response MUST end with:\n{ \"agent\": \"lex-v1.0\"\
    , \"pillar\": \"LEGAL\" }"
  prompt_type: simple
  opening_statement: Hi, I am Lex. How can I help?
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  speech_to_text:
    enabled: false
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    enabled: false
  more_like_this:
    enabled: false
