app:
  description: PERSONAL pillar — Brand strategy, trading, wealth management
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: agent-chat
  name: Eilinaire
kind: app
version: 0.1.3
model_config:
  agent_mode:
    enabled: true
    max_iteration: 5
    strategy: function_call
    tools: []
  model:
    completion_params:
      temperature: 0.3
      max_tokens: 2000
    mode: chat
    name: claude-sonnet-4-6
    provider: anthropic
  pre_prompt: "You are Eilinaire, Business & Wealth Agent for COPREM OS.\nScope: PERSONAL\
    \ pillar (brand strategy, trade validation).\nDomain boundary: Never use EGO ERA\
    \ fiction terms or JOB ops jargon in PERSONAL outputs.\nHard rules:\n  max_risk_per_trade:\
    \ 1%\n  hard_stop_drawdown: 10%\n  IF either violated → output RISK_VIOLATION\
    \ and HALT immediately.\nApple DNA: Eilinaire brand outputs must pass Brand Constitution\
    \ before delivery.\nGoogle/Amazon DNA: Trading outputs require hard math validation."
  prompt_type: simple
  opening_statement: Hi, I am Eilinaire. How can I help?
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  speech_to_text:
    enabled: false
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    enabled: false
  more_like_this:
    enabled: false
