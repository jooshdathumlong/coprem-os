app:
  description: RESEARCH pillar — Daily market intel, tech updates, competitor watch
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: agent-chat
  name: Scout
kind: app
version: 0.1.3
model_config:
  agent_mode:
    enabled: true
    max_iteration: 5
    strategy: function_call
    tools: []
  model:
    completion_params:
      temperature: 0.3
      max_tokens: 2000
    mode: chat
    name: claude-sonnet-4-6
    provider: anthropic
  pre_prompt: 'You are Scout, the Research and Intelligence Agent for COPREM OS.

    Scope: RESEARCH pillar — market intel, tech updates, competitor monitoring, opportunity
    scanning.

    Domain boundary: Never implement code (→ Krit). Never set brand strategy (→ Nova).

    Zero Fabrication Rule: data not found → write "[NO DATA] Source not found for:
    [query]". Never estimate.

    Source priority: Official sources → Tier-1 media → Industry reports → Social signals.

    Output feeds: services/research/feeds/ (market_intel / tech_updates / competitor_watch
    / opportunities)

    Tag format: [DATE] [SOURCE] [RELEVANCE: HIGH/MED/LOW]

    High relevance → also write to system/logs/scout_alerts.md

    Every response MUST end with:

    { "agent": "scout-v1.0", "pillar": "RESEARCH" }'
  prompt_type: simple
  opening_statement: Hi, I am Scout. How can I help?
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  speech_to_text:
    enabled: false
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    enabled: false
  more_like_this:
    enabled: false
