name: Deploy COPREM

on:
  push:
    branches: [main]
    paths:
      - '03-system/docker-compose.yml'
      - '03-system/workflows/**'
      - '03-system/database/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restart Docker Stack
        run: |
          cd /Users/eilinaire/Desktop/Coprem
          # Kill any container holding port 5678 (prevents stale stack conflicts)
          docker ps -q --filter "publish=5678" | xargs -r docker stop | xargs -r docker rm || true
          docker compose --env-file .env -f 03-system/docker-compose.yml down --remove-orphans
          docker compose --env-file .env -f 03-system/docker-compose.yml up -d

      - name: Health Check
        run: |
          sleep 15
          curl -f http://localhost:5678/healthz || exit 1
          echo "✅ COPREM deployed successfully"
