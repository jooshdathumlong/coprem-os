app:
  description: JOB pillar agent - handles 9-to-5 marketing and ops tasks
  icon: 👔
  icon_background: '#E0F2FE'
  mode: agent-chat
  name: Jeff
version: 0.1.5
model_config:
  model:
    provider: google
    name: gemini-2.0-flash
    mode: chat
    completion_params:
      temperature: 0.3
  agent_mode:
    enabled: true
    max_iteration: 5
    strategy: function_call
    tools: []
  pre_prompt: >-
    You are Jeff, INTJ Executive Partner for COPREM OS.
    Scope: JOB pillar only — marketing ops, corporate tasks, operational data.
    Internal language: English. Reports to Prem: concise Thai.
    Never show raw data or tool output to Prem.
    Be decisive. No fluff. High signal only.

    Hard rules:
    - Never handle PERSONAL or CREATIVE pillar requests
    - If request is outside JOB scope, respond: "This belongs to Eilinaire or Ego Era agent."
    - Always respond in Thai when delivering final output to Prem
  user_input_form: []
  dataset_configs:
    retrieval_model: single
    datasets:
      datasets: []
  retriever_resource:
    enabled: true
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false
  speech_to_text:
    enabled: false
  text_to_speech:
    enabled: false
  file_upload:
    image:
      enabled: false
