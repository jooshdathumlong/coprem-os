model_list:
  # ── groq/llama-3.3-70b: Tier 2 dedicated (position 1 = PRIMARY, no daily limit) ─
  - model_name: groq/llama-3.3-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # ── Tier 0: gemini-2.0-flash — Groq FIRST then Gemini 6 keys ─────────────
  - model_name: gemini-2.0-flash
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # ── gemini-2.0-flash — Gemini 6 keys, rpm_limit=14 (buffer 1 req/min) ─────
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/EILINAIRE_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/JOOSHDATHUMLONG_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/MAHITTISAK_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/SUNSETSOL_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/RLIE_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/PEABANTID_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  # ── gemini-2.0-flash-lite — Groq FIRST ───────────────────────────────────
  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # ── gemini-2.0-flash-lite — 6 keys ───────────────────────────────────────
  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/EILINAIRE_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/JOOSHDATHUMLONG_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/MAHITTISAK_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/SUNSETSOL_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/RLIE_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/PEABANTID_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  # ── Ollama Tier 3 — local Mac, no quota ─────────────────────────────────
  - model_name: ollama/llama3.1
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://host.docker.internal:11434
      timeout: 120

  - model_name: ollama/gemma4
    litellm_params:
      model: ollama/gemma4
      api_base: http://host.docker.internal:11434
      timeout: 120

  # ── ollama/qwen2.5:3b: direct alias ─────────────────────────────────────
  - model_name: ollama/qwen2.5:3b
    litellm_params:
      model: ollama/qwen2.5:3b
      api_base: http://host.docker.internal:11434
      timeout: 60

  # ── local: qwen2.5:3b — 2GB, follow instruction ดี, ไม่มี quota ─────────
  - model_name: local
    litellm_params:
      model: ollama/qwen2.5:3b
      api_base: http://host.docker.internal:11434
      timeout: 60

  # ── local-fast: qwen2.5:3b (same as local — gemma4 ไม่ใช้แล้ว ประหยัด RAM)
  - model_name: local-fast
    litellm_params:
      model: ollama/qwen2.5:3b
      api_base: http://host.docker.internal:11434
      timeout: 60

router_settings:
  routing_strategy: usage-based-routing-v2
  retry_after: 60
  num_retries: 3
  allowed_fails: 2
  cooldown_time: 60

litellm_settings:
  drop_params: true
  success_callback: []
  failure_callback: []
  # disable background health probes — /health ยิง Gemini ทุก key ทุกครั้ง = burn RPM
  health_check_interval: 0

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
