model_list:
  # ── gemini-2.0-flash — Groq FIRST (ไม่มี daily limit, reset ทุกนาที) ──────
  - model_name: gemini-2.0-flash
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # ── gemini-2.0-flash — Gemini 6 keys, rpm_limit=14 (buffer 1 req/min) ─────
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/EILINAIRE_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/JOOSHDATHUMLONG_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/MAHITTISAK_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/SUNSETSOL_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/RLIE_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/PEABANTID_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  # ── gemini-2.0-flash-lite — Groq FIRST ───────────────────────────────────
  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # ── gemini-2.0-flash-lite — 6 keys ───────────────────────────────────────
  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/EILINAIRE_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/JOOSHDATHUMLONG_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/MAHITTISAK_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/SUNSETSOL_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/RLIE_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/PEABANTID_GOOGLE_API_KEY
      rpm_limit: 14
      tpm_limit: 900000

  # ── Ollama Tier 3 — local Mac ─────────────────────────────────────────────
  - model_name: ollama/llama3.1
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://host.docker.internal:11434

  - model_name: ollama/qwen
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://host.docker.internal:11434

router_settings:
  routing_strategy: least-busy
  retry_after: 60
  num_retries: 3
  allowed_fails: 2
  cooldown_time: 60

litellm_settings:
  drop_params: true
  success_callback: []
  failure_callback: []
  # disable background health probes — /health ยิง Gemini ทุก key ทุกครั้ง = burn RPM
  health_check_interval: 0

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
