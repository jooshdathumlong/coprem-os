model_list:
  # ── Gemini 2.0 Flash — 6 keys rotate ────────────────────────
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/EILINAIRE_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/JOOSHDATHUMLONG_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/MAHITTISAK_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/SUNSETSOL_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/RLIE_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/PEABANTID_GOOGLE_API_KEY

  # ── Gemini Flash Lite — fallback ─────────────────────────────
  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/EILINAIRE_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/JOOSHDATHUMLONG_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/MAHITTISAK_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/SUNSETSOL_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/RLIE_GOOGLE_API_KEY

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/PEABANTID_GOOGLE_API_KEY

router_settings:
  routing_strategy: least-busy        # กระจาย load ทั่วทุก key
  retry_after: 60                     # รอ 60s ก่อน retry key เดิม
  num_retries: 5                      # ลอง key ถัดไปถึง 5 ครั้ง
  allowed_fails: 2                    # mark key ว่า fail หลังผิด 2 ครั้ง
  cooldown_time: 60                   # พัก key ที่ fail ไป 60s

litellm_settings:
  drop_params: true                   # ignore params ที่ Gemini ไม่รู้จัก
  success_callback: []
  failure_callback: []

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
